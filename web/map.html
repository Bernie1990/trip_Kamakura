<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>互動地圖 · Bernie & Nydia 東京旅行</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root {
    --pink:#ff8aae; --pink-soft:#ffd6e3; --pink-bg:#fff5f8;
    --ink:#4a3b44; --muted:#9a8a92; --card:#fff; --line:#f0dde5;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(160deg,var(--pink-bg),#fdf0f5 60%,#eef7fb);
    color:var(--ink); line-height:1.6; padding-bottom:40px;
  }
  header {
    text-align:center; padding:30px 20px 22px;
    background:linear-gradient(135deg,var(--pink),#ffb3c8); color:#fff;
    box-shadow:0 6px 24px rgba(255,138,174,.35);
    border-bottom-left-radius:26px; border-bottom-right-radius:26px;
  }
  header h1 { font-size:1.5rem; }
  header .meta { margin-top:6px; font-size:.9rem; opacity:.95; }
  .wrap { max-width:980px; margin:0 auto; padding:0 14px; }
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin:18px 0 10px; }
  .back, .toggle {
    text-decoration:none; color:var(--pink); font-weight:700; font-size:.9rem;
    background:#fff; padding:7px 14px; border-radius:16px; border:1.5px solid var(--pink-soft);
    cursor:pointer; transition:.15s;
  }
  .back:hover, .toggle:hover { background:var(--pink); color:#fff; }
  .toggle.off { opacity:.4; }
  .legend-bar { display:flex; flex-wrap:wrap; gap:6px; margin-left:auto; }
  #map {
    width:100%; height:74vh; min-height:460px; border-radius:18px;
    border:1px solid var(--line); box-shadow:0 4px 18px rgba(180,140,160,.15);
  }
  .note { font-size:.82rem; color:var(--muted); margin-top:10px; text-align:center; }
  .leaflet-popup-content { font-size:.9rem; line-height:1.5; }
  .leaflet-popup-content b { color:var(--pink); }
  .pin-num {
    background:#fff; border:2px solid; border-radius:50%; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.8rem;
    box-shadow:0 1px 4px rgba(0,0,0,.25);
  }
  @media (max-width:640px){ header h1{font-size:1.25rem;} #map{height:68vh;} .legend-bar{margin-left:0;width:100%;} }
</style>
</head>
<body>
<header>
  <h1>🗾 互動地圖（真實比例）</h1>
  <div class="meta">Bernie &amp; Nydia 東京旅行 ｜ 6/23 ~ 6/29</div>
</header>

<div class="wrap">
  <div class="toolbar">
    <a class="back" href="index.html">← 行程手札</a>
    <a class="back" href="route.html">🗺️ 示意圖</a>
    <a class="back" href="transit.html" style="border-color:#2f8f4e;color:#2f8f4e;">🚃 交通</a>
    <span class="back" id="fitBtn">🔍 全覽</span>
    <div class="legend-bar" id="legendBar"></div>
  </div>

  <div id="map"></div>
  <div class="note">底圖 © OpenStreetMap 貢獻者 ｜ 點圖釘看景點資訊，點上方日期可開關當天路線。</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
  const DAYS = {
    "6/23": { color:"#f4a261", label:"6/23 抵達" },
    "6/24": { color:"#2a9d8f", label:"6/24 鎌倉江之島1" },
    "6/25": { color:"#21867a", label:"6/25 鎌倉江之島2" },
    "6/26": { color:"#e76f9b", label:"6/26 銀座台場" },
    "6/27": { color:"#9b6dd6", label:"6/27 摩登夜景" },
    "6/28": { color:"#4d96ff", label:"6/28 經典景點" },
    "6/29": { color:"#d98a3c", label:"6/29 回家" }
  };

  // [day, name, lat, lng, note]
  const POINTS = [
    ["6/23","成田機場（抵達）",35.7720,140.3929,"🏨 當晚：上野站南 APA 飯店"],
    ["6/23","上野站南 APA 飯店",35.7066,139.7780,"🏨 6/23→6/24｜上野 6-7-21"],

    ["6/24","鎌倉駅",35.3192,139.5503,""],
    ["6/24","鎌倉高校前駅",35.3083,139.4937,"江ノ電・海景平交道"],
    ["6/24","小町通り",35.3206,139.5536,"商店街・逛吃"],
    ["6/24","Cafe Yoridocoro",35.3000,139.4990,"午餐・吻仔魚飯"],
    ["6/24","七里ヶ浜",35.3066,139.5060,"海岸散步"],
    ["6/24","bills 七里濱",35.3079,139.5036,"下午茶・鬆餅"],
    ["6/24","江の島",35.2996,139.4807,"看夕陽 🌅"],
    ["6/24","Raku（民宿）",35.3110,139.4853,"🏨 6/24→6/25｜片瀨海岸 2-13-4"],

    ["6/25","熊見亭",35.3245,139.5530,"鎌倉美食"],
    ["6/25","江の島散策",35.2996,139.4807,""],
    ["6/25","Espresso D Works 七里濱",35.3082,139.5040,""],

    ["6/26","銀座三越（敘敘苑）",35.6717,139.7650,"燒肉午餐"],
    ["6/26","築地場外市場",35.6655,139.7707,"海鮮"],
    ["6/26","台場（夜景）",35.6297,139.7740,"摩天輪・夜景"],

    ["6/27","代官山",35.6485,139.6993,"咖啡散策"],
    ["6/27","Stellar Garden Sky Bar",35.6586,139.7454,"高空酒吧・東京鐵塔景"],
    ["6/27","澀谷 SKY",35.6580,139.7016,"觀景台・日落"],
    ["6/27","下北澤",35.6613,139.6680,"古著小店"],
    ["6/27","六本木新城展望台",35.6605,139.7292,"夜景 🌹"],

    ["6/28","teamLab Borderless（麻布台）",35.6595,139.7416,"🎟️ 8:30 已購票"],
    ["6/28","上野公園",35.7156,139.7745,""],
    ["6/28","秋葉原電氣街",35.6987,139.7730,"電器・動漫"],
    ["6/28","淺草寺・雷門",35.7148,139.7967,""],
    ["6/28","摩利支天德大寺",35.7065,139.7745,"祈福・除厄"],
    ["6/28","豪德寺",35.6470,139.6470,"招財貓"],
    ["6/28","東京鐵塔・芝公園",35.6586,139.7454,""],
    ["6/28","成田東武機場酒店",35.7650,140.3860,"🏨 6/28→6/29"],

    ["6/29","成田機場（離境）",35.7720,140.3929,"✈ 回家"]
  ];

  const map = L.map('map', { scrollWheelZoom:true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19, attribution:'© OpenStreetMap'
  }).addTo(map);

  const layers = {};   // day -> L.layerGroup
  const allLatLngs = [];

  Object.keys(DAYS).forEach(day => {
    const g = L.layerGroup().addTo(map);
    layers[day] = g;
    const pts = POINTS.filter(p => p[0] === day);
    const line = [];
    pts.forEach((p, i) => {
      const [d,name,lat,lng,note] = p;
      const latlng = [lat,lng];
      line.push(latlng); allLatLngs.push(latlng);
      const icon = L.divIcon({
        className:'', html:`<div class="pin-num" style="border-color:${DAYS[day].color};color:${DAYS[day].color}">${i+1}</div>`,
        iconSize:[26,26], iconAnchor:[13,13]
      });
      const q = name.replace(/[（(].*?[）)]/g, '').trim() || name;
      const gmap = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
      L.marker(latlng, {icon}).addTo(g)
        .bindPopup(`<b>${day} #${i+1}</b><br><b style="color:#4a3b44;font-size:1rem">${name}</b>${note?'<br>'+note:''}<br><a href="${gmap}" target="_blank" style="display:inline-block;margin-top:6px;color:#4d96ff;font-weight:700;text-decoration:none;">📍 在 Google 地圖開啟</a>`);
    });
    if (line.length > 1) {
      L.polyline(line, { color:DAYS[day].color, weight:3.5, opacity:.75, dashArray:'1 0' }).addTo(g);
    }
  });

  function fitAll(){ map.fitBounds(L.latLngBounds(allLatLngs).pad(0.08)); }
  fitAll();
  document.getElementById('fitBtn').onclick = fitAll;

  // 圖例 + 開關
  const bar = document.getElementById('legendBar');
  Object.keys(DAYS).forEach(day => {
    const b = document.createElement('span');
    b.className = 'toggle';
    b.style.borderColor = DAYS[day].color;
    b.style.color = DAYS[day].color;
    b.textContent = DAYS[day].label;
    b.onclick = () => {
      if (map.hasLayer(layers[day])) { map.removeLayer(layers[day]); b.classList.add('off'); }
      else { map.addLayer(layers[day]); b.classList.remove('off'); }
    };
    bar.appendChild(b);
  });
</script>
</body>
</html>
